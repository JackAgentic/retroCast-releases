<svg width="1024" height="1024" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="shape-rendering: crispEdges">
  <!-- Pixel TV — antenna nubs -->
  <rect x="5" y="1" width="2" height="2" fill="black" />
  <rect x="17" y="1" width="2" height="2" fill="black" />
  <!-- Antenna diagonals -->
  <rect x="7" y="3" width="2" height="2" fill="black" />
  <rect x="15" y="3" width="2" height="2" fill="black" />
  <rect x="9" y="4" width="6" height="1" fill="black" />

  <!-- TV case -->
  <rect x="2" y="5" width="20" height="14" fill="black" />
  <!-- Screen inset -->
  <rect x="4" y="7" width="16" height="10" fill="white" />

  <!-- Pixel play button -->
  <rect x="10" y="9" width="2" height="6" fill="black" />
  <rect x="12" y="10" width="2" height="4" fill="black" />
  <rect x="14" y="11" width="2" height="2" fill="black" />

  <!-- Knob on case -->
  <rect x="21" y="8" width="1" height="2" fill="white" />
  <rect x="21" y="12" width="1" height="2" fill="white" />

  <!-- Stand -->
  <rect x="10" y="19" width="4" height="2" fill="black" />
  <rect x="8" y="21" width="8" height="2" fill="black" />
</svg>
